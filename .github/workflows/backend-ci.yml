name: CI — Backend (Railway)

on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  build-and-test:
    name: Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Health check (dry run)
        run: node -e "require('./dist/index.js')" &
        env:
          PORT: 4000
          MONGODB_URI: mongodb://localhost:27017/test
          JWT_SECRET: ci-test-secret-key
          CLIENT_URL: http://localhost:3000
          NODE_ENV: test

  # Railway auto-deploys from GitHub when RAILWAY_TOKEN is set
  # No additional deploy step needed — Railway watches the repo directly
  notify-deploy:
    name: Notify Deploy Status
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy status
        run: echo "✅ Backend passed CI. Railway will auto-deploy from main."
