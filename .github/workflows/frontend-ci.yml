name: CI — Frontend (Vercel)

on:
  push:
    branches: [main, develop]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Next.js build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://ecommerce-backend-production-c882.up.railway.app

  # Vercel auto-deploys from GitHub — no extra step needed
  # develop branch → Preview URL
  # main branch    → Production URL
  notify-deploy:
    name: Notify Deploy
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.event_name == 'push'
    steps:
      - name: Status
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "✅ Frontend CI passed → Vercel deploying to PRODUCTION"
          else
            echo "✅ Frontend CI passed → Vercel deploying PREVIEW for develop"
          fi
